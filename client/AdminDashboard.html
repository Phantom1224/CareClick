<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CareClick - Admin Dashboard</title>
    <link rel="stylesheet" href="AdminDashboard.css">
</head>
<body>

    <div id="toast-stack" class="toast-stack" aria-live="polite" aria-atomic="false"></div>

    <div class="brand-header" id="brand-header">
        <h1 class="logo">Care<span>Click</span></h1>
        <button class="logout-btn" id="admin-logout-btn" type="button">Sign Out</button>
    </div>

    <div id="view-admin">
        <main class="content-container">
            <div class="page-header">
                <h2 style="text-align: center;">Admin Dashboard</h2>
            </div>

            <div class="search-row">
                <input type="text" id="user-search-input" class="search-input" placeholder="Search by name or email...">
            </div>

            <div id="users-empty" class="msg-empty hidden">No users found.</div>
            <div id="users-list" class="user-list"></div>
        </main>
    </div>

    <div class="modal-backdrop hidden" id="delete-modal">
        <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="delete-modal-title">
            <div class="modal-header">
                <h3 id="delete-modal-title">Confirm Action</h3>
                <button class="icon-close" id="delete-cancel-btn" type="button">×</button>
            </div>
            <p id="delete-modal-body" class="modal-body">Are you sure you want to delete this user?</p>
            <div class="modal-actions">
                <button class="btn btn-role" id="delete-cancel-btn-footer" type="button">Cancel</button>
                <button class="btn btn-danger" id="delete-confirm-btn" type="button">Confirm</button>
            </div>
        </div>
    </div>

    <button class="fab-home" id="admin-home-btn" type="button" aria-label="Go to Home">
        <img src="Icon/Home-black.png" alt="" class="fab-icon">
    </button>

    <script src="shared.js"></script>
    <script src="AdminDashboard.js"></script>
</body>
</html>
